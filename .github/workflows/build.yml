name: build-installers

# Builds installers for Linux (AppImage + deb + rpm), macOS (dmg) and Windows
# (nsis .exe). Triggered manually (artifacts only) or by pushing a version tag
# like v1.2.0 -- which additionally creates a draft GitHub Release with every
# installer attached. No native modules are used, so there is nothing to rebuild
# per platform. The macOS .app is ad-hoc signed (no Apple Developer cert) so it
# is not flagged "damaged" on Apple Silicon; Windows is unsigned. Set up real
# signing/notarization separately if you need fully signed distribution.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# the release job needs write access to create the GitHub Release
permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # electron-builder needs the rpm toolchain to produce the Fedora .rpm
      - run: sudo apt-get update && sudo apt-get install -y rpm
      - run: npm install
      - run: npm run compile
      - run: npx electron-builder --linux AppImage deb rpm --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run compile
      # builds both Intel (x64) and Apple Silicon (arm64) dmgs (arches come from
      # the mac.target config in package.json)
      - run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run compile
      - run: npx electron-builder --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # On a version tag, gather every installer and publish a draft GitHub Release.
  release:
    needs: [linux, mac, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create or update release with all installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t files < <(find artifacts -type f)
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # release already exists (re-run on an existing tag): replace its assets,
            # keeping the release's draft/published state and notes
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --generate-notes \
              --title "$GITHUB_REF_NAME" \
              "${files[@]}"
          fi
